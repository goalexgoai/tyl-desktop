name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac-arm64:
    runs-on: macos-latest   # arm64 runner (Apple Silicon)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron (arm64)
        run: npx electron-builder install-app-deps --arch arm64

      - name: Build Mac arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --arch arm64 --publish never

      - name: Upload Mac arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build-arm64
          path: dist/*.dmg

  build-mac-x64:
    runs-on: macos-13   # x64 runner (Intel)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron (x64)
        run: npx electron-builder install-app-deps --arch x64

      - name: Build Mac x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --arch x64 --publish never

      - name: Upload Mac x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build-x64
          path: dist/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron (x64)
        run: npx electron-builder install-app-deps --arch x64

      - name: Build Windows
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: dist/*.exe

  release:
    needs: [build-mac-arm64, build-mac-x64, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Mac arm64 build
        uses: actions/download-artifact@v4
        with:
          name: mac-build-arm64
          path: dist/

      - name: Download Mac x64 build
        uses: actions/download-artifact@v4
        with:
          name: mac-build-x64
          path: dist/

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: win-build
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
