name: Build Desktop App

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-mac-arm64:
    runs-on: macos-latest   # arm64 runner (Apple Silicon)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron (arm64)
        run: npx electron-builder install-app-deps

      - name: Verify better-sqlite3 binary is arm64
        run: |
          NODE=$(node -e "const path=require('path');const b=require.resolve('better-sqlite3/build/Release/better_sqlite3.node');console.log(b)" 2>/dev/null || true)
          BSNODE="node_modules/better-sqlite3/build/Release/better_sqlite3.node"
          if [ -f "$BSNODE" ]; then
            ARCH=$(file "$BSNODE")
            echo "Binary: $ARCH"
            echo "$ARCH" | grep -q "arm64" || (echo "ERROR: expected arm64, got wrong arch" && exit 1)
          else
            echo "WARNING: better_sqlite3.node not found at expected path"
          fi

      - name: Build Mac arm64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --arm64 --publish never

      - name: Upload Mac arm64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build-arm64
          path: dist/*.dmg

  build-mac-x64:
    runs-on: macos-13   # x64 runner (Intel)
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron (x64)
        run: npx electron-builder install-app-deps

      - name: Verify better-sqlite3 binary is x86_64
        run: |
          BSNODE="node_modules/better-sqlite3/build/Release/better_sqlite3.node"
          if [ -f "$BSNODE" ]; then
            ARCH=$(file "$BSNODE")
            echo "Binary: $ARCH"
            echo "$ARCH" | grep -q "x86_64" || (echo "ERROR: expected x86_64, got wrong arch" && exit 1)
          else
            echo "WARNING: better_sqlite3.node not found at expected path"
          fi

      - name: Build Mac x64
        env:
          CSC_IDENTITY_AUTO_DISCOVERY: false
        run: npx electron-builder --mac --x64 --publish never

      - name: Upload Mac x64 artifact
        uses: actions/upload-artifact@v4
        with:
          name: mac-build-x64
          path: dist/*.dmg

  build-win:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: npm ci

      - name: Rebuild native modules for Electron (x64)
        run: npx electron-builder install-app-deps

      - name: Build Windows
        run: npx electron-builder --win --publish never

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: win-build
          path: dist/*.exe

  release:
    needs: [build-mac-arm64, build-mac-x64, build-win]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    permissions:
      contents: write
    steps:
      - name: Download Mac arm64 build
        uses: actions/download-artifact@v4
        with:
          name: mac-build-arm64
          path: dist/

      - name: Download Mac x64 build
        uses: actions/download-artifact@v4
        with:
          name: mac-build-x64
          path: dist/

      - name: Download Windows build
        uses: actions/download-artifact@v4
        with:
          name: win-build
          path: dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          draft: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
