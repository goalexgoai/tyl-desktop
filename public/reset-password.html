<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Reset Password — Text Your List</title>
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NKZFD2HBFH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NKZFD2HBFH');
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f4;
      display: flex; min-height: 100vh; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff; border: 1px solid #e5e5e4; border-radius: 12px;
      padding: 36px 32px; width: 100%; max-width: 380px;
    }
    .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
    .tagline { font-size: 13px; color: #666; margin-bottom: 28px; }
    label { display: block; font-size: 12.5px; font-weight: 600; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
    input[type="password"] {
      width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 7px;
      font-size: 14px; font-family: inherit; outline: none; margin-bottom: 16px;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #111; }
    .btn {
      width: 100%; padding: 10px; background: #111; color: #fff; border: none; border-radius: 7px;
      font-size: 14.5px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn:hover:not(:disabled) { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .alert { padding: 10px 14px; border-radius: 6px; font-size: 13.5px; margin-bottom: 14px; }
    .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .alert-success { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
    .pw-hint { font-size: 11.5px; color: #888; margin-top: -10px; margin-bottom: 12px; }
    .pw-strength { display: flex; gap: 4px; margin-top: 5px; margin-bottom: 12px; }
    .pw-strength-bar { height: 3px; flex: 1; border-radius: 99px; background: #e5e5e4; transition: background 0.2s; }
    .footer-link { text-align: center; margin-top: 20px; font-size: 13.5px; color: #666; }
    .footer-link a { color: #111; font-weight: 600; text-decoration: none; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo">Text Your List</div>
  <div class="tagline">Set a new password</div>
  <div id="alert"></div>
  <form id="form">
    <label>New password</label>
    <input type="password" id="password" placeholder="8+ chars, letter, number, special" autocomplete="new-password" required />
    <div class="pw-strength">
      <div class="pw-strength-bar" id="ps1"></div>
      <div class="pw-strength-bar" id="ps2"></div>
      <div class="pw-strength-bar" id="ps3"></div>
      <div class="pw-strength-bar" id="ps4"></div>
    </div>
    <div class="pw-hint" id="pw-hint">8+ characters, one letter, one number, one special character</div>
    <button type="submit" class="btn" id="btn">Set new password</button>
  </form>
  <div class="footer-link"><a href="/login">Back to log in</a></div>
</div>
<script>
  const params = new URLSearchParams(window.location.search);
  const token = params.get('token');
  if (!token) {
    document.getElementById('alert').innerHTML = '<div class="alert alert-error">Invalid reset link. Please request a new one.</div>';
    document.getElementById('form').style.display = 'none';
  }

  const pwInput = document.getElementById('password');
  const bars = [document.getElementById('ps1'), document.getElementById('ps2'), document.getElementById('ps3'), document.getElementById('ps4')];
  const pwHint = document.getElementById('pw-hint');
  const colors = ['#dc2626', '#f97316', '#eab308', '#16a34a'];

  pwInput.addEventListener('input', () => {
    const pw = pwInput.value;
    if (!pw) { bars.forEach(b => b.style.background = '#e5e5e4'); return; }
    const checks = {
      length: pw.length >= 8,
      letter: /[a-zA-Z]/.test(pw),
      number: /[0-9]/.test(pw),
      special: /[!@#$%^&*()\-_=+\[\]{};':"\\|,.<>\/?]/.test(pw),
    };
    const score = Object.values(checks).filter(Boolean).length;
    bars.forEach((b, i) => { b.style.background = i < score ? colors[score - 1] : '#e5e5e4'; });
    const missing = [];
    if (!checks.length) missing.push('8+ characters');
    if (!checks.letter) missing.push('a letter');
    if (!checks.number) missing.push('a number');
    if (!checks.special) missing.push('a special character');
    pwHint.textContent = missing.length === 0 ? 'Strong password' : 'Still need: ' + missing.join(', ');
  });

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const alertEl = document.getElementById('alert');
    alertEl.innerHTML = '';
    btn.disabled = true;
    btn.textContent = 'Saving...';
    try {
      const res = await fetch('/api/auth/reset-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ token, password: pwInput.value }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Failed');
      alertEl.innerHTML = '<div class="alert alert-success">Password updated. Redirecting to log in...</div>';
      document.getElementById('form').style.display = 'none';
      setTimeout(() => { window.location.href = '/login?msg=password_updated'; }, 1800);
    } catch (ex) {
      alertEl.innerHTML = `<div class="alert alert-error">${ex.message}</div>`;
      btn.disabled = false;
      btn.textContent = 'Set new password';
    }
  });
</script>
</body>
</html>
