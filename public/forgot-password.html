<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Forgot Password — Text Your List</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='48' height='48' viewBox='0 0 48 48' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='48' height='48' rx='24' fill='%23C44A76'/%3E%3Crect x='9' y='13' width='30' height='5' rx='2.5' fill='white'/%3E%3Crect x='9' y='22' width='22' height='5' rx='2.5' fill='white' opacity='0.7'/%3E%3Crect x='9' y='31' width='26' height='5' rx='2.5' fill='white' opacity='0.45'/%3E%3Ccircle cx='37' cy='35' r='7' fill='%232C60A0'/%3E%3Cpath d='M33.5 35L35.8 37.5L40.5 32.5' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NKZFD2HBFH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NKZFD2HBFH');

  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f4;
      display: flex; min-height: 100vh; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff; border: 1px solid #e5e5e4; border-radius: 12px;
      padding: 36px 32px; width: 100%; max-width: 380px;
    }
    .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
    .tagline { font-size: 13px; color: #666; margin-bottom: 28px; }
    label { display: block; font-size: 12.5px; font-weight: 600; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
    input[type="email"] {
      width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 7px;
      font-size: 14px; font-family: inherit; outline: none; margin-bottom: 16px;
      transition: border-color 0.15s;
    }
    input:focus { border-color: #111; }
    .btn {
      width: 100%; padding: 10px; background: #111; color: #fff; border: none; border-radius: 7px;
      font-size: 14.5px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn:hover:not(:disabled) { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .alert { padding: 10px 14px; border-radius: 6px; font-size: 13.5px; margin-bottom: 14px; }
    .alert-error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; }
    .alert-success { background: #dcfce7; color: #15803d; border: 1px solid #86efac; }
    .alert-info { background: #dbeafe; color: #1d4ed8; border: 1px solid #93c5fd; }
    .footer-link { text-align: center; margin-top: 20px; font-size: 13.5px; color: #666; }
    .footer-link a { color: #111; font-weight: 600; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
    .reset-link-box { word-break: break-all; font-family: monospace; font-size: 12px; background: #f3f4f6; padding: 10px; border-radius: 6px; border: 1px solid #ddd; margin-top: 10px; }
    .copy-btn { margin-top: 8px; padding: 6px 14px; background: #111; color: #fff; border: none; border-radius: 6px; cursor: pointer; font-size: 13px; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo" style="display:flex;align-items:center;gap:8px;justify-content:center"><svg width="32" height="32" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="36" height="36" rx="10" fill="#C44A76"/><rect x="7" y="10" width="22" height="4" rx="2" fill="white"/><rect x="7" y="17" width="16" height="4" rx="2" fill="white" opacity="0.7"/><rect x="7" y="24" width="19" height="4" rx="2" fill="white" opacity="0.5"/><circle cx="27" cy="26" r="5" fill="#2C60A0"/><path d="M24.5 26L26.2 27.8L29.5 24.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg><span><span style="color:#1A1A1A">Text </span><span style="color:#C44A76">Your</span><span style="color:#1A1A1A"> List</span></span></div>
  <div class="tagline">Reset your password</div>
  <div id="alert"></div>
  <form id="form">
    <label>Email address</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
    <button type="submit" class="btn" id="btn">Send reset link</button>
  </form>
  <div class="footer-link"><a href="/login">Back to log in</a></div>
</div>
<script>
  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const alertEl = document.getElementById('alert');
    alertEl.innerHTML = '';
    btn.disabled = true;
    btn.textContent = 'Sending...';
    try {
      const res = await fetch('/api/auth/forgot-password', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email: document.getElementById('email').value.trim() }),
      });
      const data = await res.json();
      if (data.emailSent) {
        alertEl.innerHTML = '<div class="alert alert-success">Reset link sent — check your email.</div>';
        document.getElementById('form').style.display = 'none';
      } else if (data.resetLink) {
        // SMTP not configured — show link on screen
        alertEl.innerHTML = `
          <div class="alert alert-info">
            <strong>Email not configured.</strong> Copy this link and send it to the user manually:
            <div class="reset-link-box" id="reset-link">${data.resetLink}</div>
            <button class="copy-btn" onclick="copyLink()">Copy link</button>
          </div>`;
        document.getElementById('form').style.display = 'none';
      } else {
        // User not found — show same success to avoid enumeration
        alertEl.innerHTML = '<div class="alert alert-success">If an account exists with that email, a reset link was sent.</div>';
        document.getElementById('form').style.display = 'none';
      }
    } catch (ex) {
      alertEl.innerHTML = `<div class="alert alert-error">${ex.message}</div>`;
      btn.disabled = false;
      btn.textContent = 'Send reset link';
    }
  });

  function copyLink() {
    const link = document.getElementById('reset-link').textContent;
    navigator.clipboard.writeText(link).then(() => {
      document.querySelector('.copy-btn').textContent = 'Copied!';
    });
  }
</script>
</body>
</html>
