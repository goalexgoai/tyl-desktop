<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Log in — Text Your List</title>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='48' height='48' viewBox='0 0 48 48' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='48' height='48' rx='24' fill='%23C44A76'/%3E%3Crect x='9' y='13' width='30' height='5' rx='2.5' fill='white'/%3E%3Crect x='9' y='22' width='22' height='5' rx='2.5' fill='white' opacity='0.7'/%3E%3Crect x='9' y='31' width='26' height='5' rx='2.5' fill='white' opacity='0.45'/%3E%3Ccircle cx='37' cy='35' r='7' fill='%232C60A0'/%3E%3Cpath d='M33.5 35L35.8 37.5L40.5 32.5' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NKZFD2HBFH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NKZFD2HBFH');
  </script>
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', system-ui, sans-serif;
      background: #f5f5f4;
      display: flex; min-height: 100vh; align-items: center; justify-content: center;
      padding: 20px;
    }
    .card {
      background: #fff; border: 1px solid #e5e5e4; border-radius: 12px;
      padding: 36px 32px; width: 100%; max-width: 380px;
    }
    .logo { font-size: 20px; font-weight: 800; letter-spacing: -0.5px; margin-bottom: 6px; }
    .tagline { font-size: 13px; color: #666; margin-bottom: 28px; }
    label { display: block; font-size: 12.5px; font-weight: 600; color: #555; margin-bottom: 5px; text-transform: uppercase; letter-spacing: 0.4px; }
    input[type="email"], input[type="password"], input[type="text"].pw-field {
      width: 100%; padding: 9px 12px; border: 1px solid #ddd; border-radius: 7px;
      font-size: 14px; font-family: inherit; outline: none; margin-bottom: 16px;
      transition: border-color 0.15s;
    }
    .pw-wrap { position: relative; }
    .pw-wrap input { padding-right: 38px; margin-bottom: 16px; }
    .pw-toggle { position: absolute; right: 10px; top: 50%; transform: translateY(-50%); background: none; border: none; cursor: pointer; color: #9ca3af; padding: 4px; line-height: 0; }
    input:focus { border-color: #111; }
    .btn {
      width: 100%; padding: 10px; background: #111; color: #fff; border: none; border-radius: 7px;
      font-size: 14.5px; font-weight: 600; cursor: pointer; font-family: inherit;
      transition: opacity 0.15s;
    }
    .btn:hover:not(:disabled) { opacity: 0.85; }
    .btn:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { background: #fee2e2; color: #991b1b; border: 1px solid #fca5a5; border-radius: 6px; padding: 9px 12px; font-size: 13.5px; margin-bottom: 14px; display: none; }
    .footer-link { text-align: center; margin-top: 20px; font-size: 13.5px; color: #666; }
    .footer-link a { color: #111; font-weight: 600; text-decoration: none; }
    .footer-link a:hover { text-decoration: underline; }
  </style>
</head>
<body>
<div class="card">
  <div class="logo" style="display:flex;align-items:center;gap:8px;justify-content:center"><svg width="32" height="32" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg"><rect width="36" height="36" rx="10" fill="#C44A76"/><rect x="7" y="10" width="22" height="4" rx="2" fill="white"/><rect x="7" y="17" width="16" height="4" rx="2" fill="white" opacity="0.7"/><rect x="7" y="24" width="19" height="4" rx="2" fill="white" opacity="0.5"/><circle cx="27" cy="26" r="5" fill="#2C60A0"/><path d="M24.5 26L26.2 27.8L29.5 24.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/></svg><span><span style="color:#1A1A1A">Text </span><span style="color:#C44A76">Your</span><span style="color:#1A1A1A"> List</span></span></div>
  <div class="tagline">Welcome back</div>
  <div class="error" id="err"></div>
  <div id="success-msg" style="background:#dcfce7;color:#15803d;border:1px solid #86efac;border-radius:6px;padding:9px 12px;font-size:13.5px;margin-bottom:14px;display:none"></div>
  <form id="form">
    <label>Email</label>
    <input type="email" id="email" placeholder="you@example.com" autocomplete="email" required />
    <label>Password</label>
    <div class="pw-wrap">
      <input type="password" id="password" class="pw-field" placeholder="••••••••" autocomplete="current-password" required />
      <button type="button" class="pw-toggle" tabindex="-1" onclick="var i=document.getElementById('password');i.type=i.type==='password'?'text':'password'" aria-label="Show password">
        <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M1 12s4-8 11-8 11 8 11 8-4 8-11 8-11-8-11-8z"/><circle cx="12" cy="12" r="3"/></svg>
      </button>
    </div>
    <button type="submit" class="btn" id="btn">Log in</button>
  </form>
  <div class="footer-link" style="margin-top:12px"><a href="/forgot-password">Forgot your password?</a></div>
  <div class="footer-link">Don't have an account? <a href="/signup">Sign up free</a></div>
</div>
<script>
  // Show password updated message
  const urlParams = new URLSearchParams(window.location.search);
  if (urlParams.get('msg') === 'password_updated') {
    document.getElementById('success-msg').textContent = 'Password updated successfully. Please log in.';
    document.getElementById('success-msg').style.display = 'block';
  }

  document.getElementById('form').addEventListener('submit', async (e) => {
    e.preventDefault();
    const btn = document.getElementById('btn');
    const err = document.getElementById('err');
    err.style.display = 'none';
    btn.disabled = true;
    btn.textContent = 'Logging in...';
    try {
      const res = await fetch('/api/auth/login', {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({
          email: document.getElementById('email').value.trim(),
          password: document.getElementById('password').value,
        }),
      });
      const data = await res.json();
      if (!res.ok) throw new Error(data.error || 'Login failed');
      // Clear any pending plan from a prior signup flow
      localStorage.removeItem('pending_plan');
      const params = new URLSearchParams(window.location.search);
      window.location.href = params.get('next') || '/app';
    } catch (ex) {
      err.textContent = ex.message;
      err.style.display = 'block';
      btn.disabled = false;
      btn.textContent = 'Log in';
    }
  });
</script>
</body>
</html>
