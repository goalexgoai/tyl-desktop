<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Text Your List</title>
  <link rel="stylesheet" href="/style.css" />
  <!-- Google tag (gtag.js) -->
  <script async src="https://www.googletagmanager.com/gtag/js?id=G-NKZFD2HBFH"></script>
  <script>
    window.dataLayer = window.dataLayer || [];
    function gtag(){dataLayer.push(arguments);}
    gtag('js', new Date());
    gtag('config', 'G-NKZFD2HBFH');
  </script>
  <link rel="icon" type="image/svg+xml" href="data:image/svg+xml,%3Csvg width='48' height='48' viewBox='0 0 48 48' fill='none' xmlns='http://www.w3.org/2000/svg'%3E%3Crect width='48' height='48' rx='24' fill='%23C44A76'/%3E%3Crect x='9' y='13' width='30' height='5' rx='2.5' fill='white'/%3E%3Crect x='9' y='22' width='22' height='5' rx='2.5' fill='white' opacity='0.7'/%3E%3Crect x='9' y='31' width='26' height='5' rx='2.5' fill='white' opacity='0.45'/%3E%3Ccircle cx='37' cy='35' r='7' fill='%232C60A0'/%3E%3Cpath d='M33.5 35L35.8 37.5L40.5 32.5' stroke='white' stroke-width='2' stroke-linecap='round' stroke-linejoin='round'/%3E%3C/svg%3E" />
</head>
<body>
<div class="layout">

  <!-- Sidebar — Build 4: reordered navigation -->
  <aside class="sidebar">
    <div class="sidebar-logo">
      <div class="sidebar-logo-mark">
        <svg width="30" height="30" viewBox="0 0 36 36" fill="none" xmlns="http://www.w3.org/2000/svg" aria-hidden="true">
          <rect width="36" height="36" rx="10" fill="#C44A76"/>
          <rect x="7" y="10" width="22" height="4" rx="2" fill="white"/>
          <rect x="7" y="17" width="16" height="4" rx="2" fill="white" opacity="0.7"/>
          <rect x="7" y="24" width="19" height="4" rx="2" fill="white" opacity="0.5"/>
          <circle cx="27" cy="26" r="5" fill="#2C60A0"/>
          <path d="M24.5 26L26.2 27.8L29.5 24.5" stroke="white" stroke-width="1.6" stroke-linecap="round" stroke-linejoin="round"/>
        </svg>
        <h1><span class="w-light">Text </span><span class="w-your">Your</span><span class="w-light"> List</span></h1>
      </div>
      <span id="user-plan-label">Loading...</span>
    </div>

    <!-- Main nav -->
    <button class="nav-item active" data-view="send">
      <span class="nav-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><path d="M2 8l10-5-4 5 4 5L2 8z"/></svg></span>
      Send Messages
    </button>

    <button class="nav-item" data-view="quick-send">
      <span class="nav-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><rect x="2" y="3" width="12" height="10" rx="1.5"/><path d="M5 8h6M5 11h4"/></svg></span>
      Test Send
    </button>

    <button class="nav-item" data-view="contacts">
      <span class="nav-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><circle cx="6" cy="5" r="2.5"/><path d="M1 13c0-2.8 2.2-5 5-5s5 2.2 5 5"/><circle cx="12" cy="5" r="2"/><path d="M12 9c1.7 0 3 1.3 3 3"/></svg></span>
      Contact Lists
    </button>

    <button class="nav-item" data-view="templates">
      <span class="nav-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><rect x="2" y="2" width="12" height="12" rx="2"/><path d="M5 6h6M5 9h4"/></svg></span>
      Message Templates
    </button>

    <button class="nav-item" data-view="suppression">
      <span class="nav-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><circle cx="8" cy="8" r="6"/><path d="M5 8h6"/></svg></span>
      Suppression List
    </button>

    <button class="nav-item" data-view="history">
      <span class="nav-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><circle cx="8" cy="8" r="6"/><path d="M8 5v3l2 2"/></svg></span>
      Send History
    </button>

    <div style="flex:1"></div>

    <!-- Bottom section -->
    <div class="sidebar-bottom">
      <div class="sidebar-divider"></div>
      <button class="nav-item" data-view="account">
        <span class="nav-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><circle cx="8" cy="8" r="2.5"/><path d="M8 1v2m0 10v2M1 8h2m10 0h2m-3.5-4.5-1.5 1.5M5 11l-1.5 1.5M11 11l1.5 1.5M5 5 3.5 3.5"/></svg></span>
        Account Settings
      </button>
      <button class="nav-item" data-view="developer" id="nav-developer">
        <span class="nav-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><polyline points="5,4 2,8 5,12"/><polyline points="11,4 14,8 11,12"/><line x1="8" y1="3" x2="8" y2="13"/></svg></span>
        Developer
      </button>
      <button class="nav-item" data-view="help">
        <span class="nav-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><circle cx="8" cy="8" r="6"/><path d="M6 6c0-1.1.9-2 2-2s2 .9 2 2c0 1.1-.9 1.5-2 2v1m0 2v.5"/></svg></span>
        Help
      </button>
      <button class="nav-item" id="logout-btn">
        <span class="nav-icon"><svg viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5" width="16" height="16"><path d="M10 8H3m0 0l3-3m-3 3l3 3"/><path d="M6 3h6a1 1 0 011 1v8a1 1 0 01-1 1H6"/></svg></span>
        Log out
      </button>
    </div>
  </aside>

  <!-- Main -->
  <main class="main" id="main">
    <!-- Views injected by JS -->
  </main>

</div>

<!-- App footer disclaimer -->
<div id="app-footer" style="display:none;text-align:center;padding:8px 16px;font-size:11.5px;color:#999;border-top:1px solid #e5e5e4;background:#fafafa">
  Text Your List schedules messages sent from your own device. You are responsible for compliance with applicable messaging laws.
  <span id="footer-web-links">
    &nbsp;&middot;&nbsp;
    <a href="/terms#disclaimer" style="color:#777;text-decoration:underline">See full disclaimer</a>
    &nbsp;&middot;&nbsp;
    <a href="/privacy" style="color:#777">Privacy Policy</a>
    &nbsp;&middot;&nbsp;
    <a href="/terms" style="color:#777">Terms of Use</a>
  </span>
  &nbsp;&middot;&nbsp;
  <a href="mailto:support@textyourlist.com" style="color:#777">Support</a>
</div>

<!-- Wizard overlay (injected by JS when needed) -->
<div id="wizard-root"></div>

<!-- Toast -->
<div id="toast" style="display:none;position:fixed;bottom:24px;left:50%;transform:translateX(-50%);background:#111;color:#fff;padding:10px 20px;border-radius:8px;font-size:13.5px;z-index:500;white-space:nowrap"></div>

<script src="/app.js"></script>
</body>
</html>
